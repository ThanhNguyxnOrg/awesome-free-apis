name: Link Checker

on:
  # Run on push to main branch
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "scripts/check_links.py"
      - ".github/workflows/link-checker.yml"

  # Run on pull requests
  pull_request:
    paths:
      - "README.md"

  # Run daily at 00:00 UTC to catch broken links
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check links with improved script
        id: check
        run: |
          cd scripts
          python check_links.py > output.txt 2>&1 || true
          cat output.txt

          # Parse report stats
          if [ -f link_check_report.txt ]; then
            BROKEN_COUNT=$(grep -oP "Broken: \K[0-9]+" link_check_report.txt || echo "0")
            OK_COUNT=$(grep -oP "Working: \K[0-9]+" link_check_report.txt || echo "0")
            PROTECTED_COUNT=$(grep -oP "Protected: \K[0-9]+" link_check_report.txt || echo "0")
            WARN_COUNT=$(grep -oP "Warnings: \K[0-9]+" link_check_report.txt || echo "0")
            ERR_COUNT=$(grep -oP "Errors: \K[0-9]+" link_check_report.txt || echo "0")
            TOTAL=$(($(grep -oP "Working: \K[0-9]+" link_check_report.txt || echo 0) + $(grep -oP "Protected: \K[0-9]+" link_check_report.txt || echo 0)))
          else
            BROKEN_COUNT=0
            OK_COUNT=0
            PROTECTED_COUNT=0
            WARN_COUNT=0
            ERR_COUNT=0
            TOTAL=0
          fi

          echo "broken_count=$BROKEN_COUNT" >> $GITHUB_OUTPUT
          echo "ok_count=$OK_COUNT" >> $GITHUB_OUTPUT
          echo "protected_count=$PROTECTED_COUNT" >> $GITHUB_OUTPUT
          echo "warn_count=$WARN_COUNT" >> $GITHUB_OUTPUT
          echo "err_count=$ERR_COUNT" >> $GITHUB_OUTPUT
          echo "total_healthy=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$BROKEN_COUNT" -gt 0 ]; then
            echo "has_broken=true" >> $GITHUB_OUTPUT
          else
            echo "has_broken=false" >> $GITHUB_OUTPUT
          fi

          # Read broken URLs list
          if [ -f broken_urls.txt ]; then
            BROKEN_LIST=$(cat broken_urls.txt)
          else
            BROKEN_LIST=""
          fi

          # Store broken list as multiline output
          {
            echo "broken_list<<BROKEN_EOF"
            echo "$BROKEN_LIST"
            echo "BROKEN_EOF"
          } >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: |
            scripts/link_check_report.txt
            scripts/broken_urls.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const summary = fs.readFileSync('scripts/link_check_report.txt', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🔗 Link Check Results\n\n\`\`\`\n${summary}\n\`\`\`\n\n💡 **Note:** 403/429 status codes indicate bot protection and are considered valid.`
              });
            } catch (error) {
              console.log('Error commenting on PR:', error);
            }

      # Single persistent issue — always update the SAME issue body
      - name: Update daily report issue
        if: github.event_name != 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hasBroken = '${{ steps.check.outputs.has_broken }}' === 'true';
            const brokenCount = parseInt('${{ steps.check.outputs.broken_count }}') || 0;
            const okCount = parseInt('${{ steps.check.outputs.ok_count }}') || 0;
            const protectedCount = parseInt('${{ steps.check.outputs.protected_count }}') || 0;
            const warnCount = parseInt('${{ steps.check.outputs.warn_count }}') || 0;
            const errCount = parseInt('${{ steps.check.outputs.err_count }}') || 0;
            const totalHealthy = parseInt('${{ steps.check.outputs.total_healthy }}') || 0;
            const currentBrokenList = `${{ steps.check.outputs.broken_list }}`.trim();

            const REPORT_LABEL = 'daily-report';
            const AUTO_LABEL = 'automated';
            const ISSUE_TITLE = '📊 Daily Link Health Report';

            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Ensure labels exist
            for (const label of [
              { name: REPORT_LABEL, color: '5319e7', description: 'Automated daily link health report' },
              { name: AUTO_LABEL, color: '0e8a16', description: 'Created by automated workflow' }
            ]) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
              }
            }

            // Build the status icon
            const statusIcon = hasBroken ? '🔴' : '🟢';
            const statusText = hasBroken ? `${brokenCount} broken link${brokenCount > 1 ? 's' : ''} detected` : 'All links healthy';

            // Build broken links table
            let brokenSection = '';
            if (hasBroken) {
              const brokenLines = currentBrokenList.split('\n').filter(l => l.trim());
              let brokenTable = '| # | URL | Status |\n|---|---|---|\n';
              brokenLines.forEach((url, i) => {
                brokenTable += `| ${i + 1} | ${url} | ❌ 404 |\n`;
              });
              brokenSection = `### 💀 Broken Links\n\n${brokenTable}\n\n**Action needed:** Review and update/remove these dead links from README.md.\n`;
            } else {
              brokenSection = `### ✅ No Broken Links\n\nAll API links are responding correctly. Nothing to fix! 🎉\n`;
            }

            // Build the issue body
            const lines = [
              `## ${statusIcon} Link Health Status: ${statusText}`,
              '',
              `**Last checked**: ${today}`,
              `**Workflow run**: [#${context.runNumber}](${runUrl})`,
              `**Trigger**: \`${context.eventName}\``,
              '',
              '---',
              '',
              '### 📈 Summary',
              '',
              '| Category | Count | Description |',
              '|---|---|---|',
              `| ✅ Working | ${okCount} | HTTP 200 — responding correctly |`,
              `| 🛡️ Protected | ${protectedCount} | HTTP 403/429 — bot protection (API still works) |`,
              `| ⚠️ Warning | ${warnCount} | Timeout/DNS/SSL issues (may be temporary) |`,
              `| ❌ Error | ${errCount} | Server errors (5xx) |`,
              `| 💀 Broken | ${brokenCount} | HTTP 404/410 — confirmed dead |`,
              '',
              `**Healthy rate**: ${okCount + protectedCount} / ${okCount + protectedCount + warnCount + errCount + brokenCount} APIs healthy`,
              '',
              '---',
              '',
              brokenSection,
              '',
              '---',
              '',
              '### 📋 How This Works',
              '',
              '- 🔄 This report is **automatically updated daily** at 00:00 UTC',
              '- 🛡️ APIs with bot protection (403/429) are counted as **healthy**',
              '- 💀 Only confirmed 404/410 responses are marked as **broken**',
              `- 📦 Full report available as [workflow artifact](${runUrl})`,
              '',
              `> *Last updated by [Link Checker workflow](${runUrl}) on ${today}*`
            ];
            const body = lines.join('\n');

            // Find existing report issue
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: `${REPORT_LABEL},${AUTO_LABEL}`,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });

            if (existingIssues.length > 0) {
              // Update existing issue body
              const issue = existingIssues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: body
              });
              console.log(`Updated issue #${issue.number}: ${issue.html_url}`);
            } else {
              // Create the issue for the first time
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: ISSUE_TITLE,
                labels: [REPORT_LABEL, AUTO_LABEL],
                body: body
              });
              // Pin the issue (optional — requires admin, may fail silently)
              try {
                await github.graphql(`
                  mutation {
                    pinIssue(input: { issueId: "${issue.data.node_id}" }) {
                      issue { id }
                    }
                  }
                `);
                console.log('Issue pinned!');
              } catch {
                console.log('Could not pin issue (needs admin permissions)');
              }
              console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            }

      - name: Fail if broken links found
        if: steps.check.outputs.has_broken == 'true'
        run: |
          echo "❌ Broken links detected! Check the artifact for details."
          exit 1
